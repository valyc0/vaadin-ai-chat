# Provider: OpenRouter (endpoint OpenAI-compatibile, accesso a centinaia di modelli)
# Base URL senza /v1 perché Spring AI aggiunge automaticamente /v1/chat/completions
spring.ai.openai.base-url=https://openrouter.ai/api
spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.chat.options.model=anthropic/claude-sonnet-4-5
# Esempi di altri modelli disponibili su OpenRouter:
# openai/gpt-4o
# google/gemini-2.5-pro
# meta-llama/llama-3.3-70b-instruct
# deepseek/deepseek-r1

# Disabilita Ollama
spring.ai.ollama.chat.enabled=false
