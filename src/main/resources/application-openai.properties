# Provider: Cerebras (endpoint OpenAI-compatibile)
# Cerebras non usa api.openai.com ma il proprio base-url.
# Richiede il fix RestClient.Builder in ChatApplication (HTTP 411 - Content-Length).
spring.ai.openai.base-url=https://api.cerebras.ai
spring.ai.openai.api-key=${CEREBRAS_API_KEY}
spring.ai.openai.chat.options.model=gpt-oss-120b
spring.ai.openai.chat.options.max-tokens=32768
spring.ai.openai.chat.options.temperature=1.0
spring.ai.openai.chat.options.top-p=1.0

# Disabilita Ollama
spring.ai.ollama.chat.enabled=false
spring.autoconfigure.exclude=org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
